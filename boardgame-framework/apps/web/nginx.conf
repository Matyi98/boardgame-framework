server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — all unmatched routes go to index.html so React Router can handle them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache for fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
