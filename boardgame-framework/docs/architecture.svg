<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .lbl { font-size: 13px; fill: #1f2328; }
      .sub { font-size: 11px; fill: #59636e; }
      .h { font-size: 12px; font-weight: 600; fill: #1f2328; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5; rx: 6; ry: 6; }
      .svc { fill: #f5f0ff; stroke: #8250df; stroke-width: 1.5; rx: 6; ry: 6; }
      .infra { fill: #e6f6f6; stroke: #1f9b9b; stroke-width: 1.5; rx: 6; ry: 6; }
      .group { fill: none; stroke: #59636e; stroke-width: 1; stroke-dasharray: 4 4; rx: 8; ry: 8; }
      .arrow { stroke: #59636e; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59636e"/>
    </marker>
  </defs>

  <!-- Web client -->
  <rect class="box" x="260" y="20" width="160" height="50"/>
  <text class="lbl" x="340" y="42" text-anchor="middle">Web Client</text>
  <text class="sub" x="340" y="58" text-anchor="middle">React · Vite · Socket.io</text>

  <!-- API Gateway -->
  <rect class="box" x="260" y="110" width="160" height="50"/>
  <text class="lbl" x="340" y="132" text-anchor="middle">API Gateway</text>
  <text class="sub" x="340" y="148" text-anchor="middle">Traefik · sticky sessions</text>

  <!-- Services row -->
  <rect class="svc" x="30"  y="210" width="140" height="60"/>
  <text class="lbl" x="100" y="234" text-anchor="middle">auth-service</text>
  <text class="sub" x="100" y="250" text-anchor="middle">JWT · users</text>
  <text class="sub" x="100" y="262" text-anchor="middle">:3001</text>

  <rect class="svc" x="190" y="210" width="140" height="60"/>
  <text class="lbl" x="260" y="234" text-anchor="middle">lobby-service</text>
  <text class="sub" x="260" y="250" text-anchor="middle">rooms · matchmaking</text>
  <text class="sub" x="260" y="262" text-anchor="middle">:3002</text>

  <rect class="svc" x="350" y="210" width="140" height="60"/>
  <text class="lbl" x="420" y="234" text-anchor="middle">realtime-gateway</text>
  <text class="sub" x="420" y="250" text-anchor="middle">Socket.io · fan-out · ×N</text>
  <text class="sub" x="420" y="262" text-anchor="middle">:3003</text>

  <rect class="svc" x="510" y="210" width="140" height="60"/>
  <text class="lbl" x="580" y="234" text-anchor="middle">game-engine</text>
  <text class="sub" x="580" y="250" text-anchor="middle">turn logic · ×N</text>
  <text class="sub" x="580" y="262" text-anchor="middle">:3004</text>

  <!-- Infra group -->
  <rect class="group" x="30" y="340" width="620" height="140"/>
  <text class="h" x="50" y="362">Shared Infrastructure</text>

  <rect class="infra" x="60"  y="380" width="160" height="70"/>
  <text class="lbl" x="140" y="408" text-anchor="middle">PostgreSQL</text>
  <text class="sub" x="140" y="424" text-anchor="middle">users · rooms · snapshots</text>

  <rect class="infra" x="260" y="380" width="160" height="70"/>
  <text class="lbl" x="340" y="408" text-anchor="middle">Redis</text>
  <text class="sub" x="340" y="424" text-anchor="middle">hot state · locks · cache</text>

  <rect class="infra" x="460" y="380" width="160" height="70"/>
  <text class="lbl" x="540" y="408" text-anchor="middle">RabbitMQ</text>
  <text class="sub" x="540" y="424" text-anchor="middle">game.commands · game.events</text>

  <!-- Arrows -->
  <path class="arrow" d="M 340 70 V 110"/>
  <path class="arrow" d="M 340 160 V 200 H 100 V 210"/>
  <path class="arrow" d="M 340 160 V 200 H 260 V 210"/>
  <path class="arrow" d="M 340 160 V 200 H 420 V 210"/>
  <path class="arrow" d="M 340 160 V 200 H 580 V 210"/>

  <path class="arrow" d="M 100 270 V 340"/>
  <path class="arrow" d="M 260 270 V 340"/>
  <path class="arrow" d="M 420 270 V 340"/>
  <path class="arrow" d="M 580 270 V 340"/>
</svg>
